<h1>Libro</h1>
@if(VM.Elemento()) {
  <p>
    <b>código:</b> {{VM.Elemento().idLibro}}<br>
    <b>titulo:</b> {{VM.Elemento().titulo}}<br>
    <b>autor:</b> {{VM.Elemento().autor}}<br>
    <b>país:</b> {{VM.Elemento().pais}}<br>
    <b>año:</b> {{VM.Elemento().fecha}}<br>
    <b>páginas:</b> {{VM.Elemento().paginas}}<br>
    <b>wiki:</b> <a href="{{VM.Elemento().wiki}}" target="_blank">{{VM.Elemento().wiki}}</a><br>
  </p>
  <p>
    <button class="btn btn-success" [routerLink]="['edit']"><i class="fas fa-pen"></i> Editar</button>
    <input class="btn btn-secondary" type="button" value="Volver" (click)="VM.cancel()">
  </p>
} @else {
  <h2>Sin datos</h2>
}
