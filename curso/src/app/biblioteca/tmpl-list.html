<table class="table table-striped table-hover">
  <thead>
    <tr class="table-info">
      <th class="display-4">Lista de libros</th>
      <th class="text-end">
        @if(VM.auth.isAuthenticated()) {
        <button class="btn btn-success" routerLink="add"><i class="fas fa-plus"></i> Añadir</button>
        }
      </th>
    </tr>
  </thead>
  <tbody>
    @for (item of VM.Listado(); track item.idLibro) {
    <tr>
        <td>
          <a class="btn btn-link btn-lg px-0" routerLink="{{item.idLibro}}">
                  {{item.titulo}}</a>
         </td>
        <td class="align-middle text-end">
        <!-- @if(VM.auth.isAuthenticated()) {
          <div class="btn-group" role="group">
            <button class="btn btn-success" [routerLink]="[item.idLibro, 'edit']"><i class="fas fa-pen"></i></button>
            <button class="btn btn-danger" (click)="VM.delete(item.idLibro)"><i class="far fa-trash-alt"></i></button>
          </div>
        } -->
      </td>
      </tr>
  }
  </tbody>
</table>
<app-paginator [current-page]="VM.page().number" [total-pages]="VM.page().totalPages" (page-change)="VM.pageChange($event)" />
